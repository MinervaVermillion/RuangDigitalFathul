<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="scrlanim.css">
    <style>
          * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background-color: #f5f5f5;
    color: #333;
}

.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background-color: #1a1a2e;
    padding : 14px 24px;
    z-index: 1000;
}

.burger-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 4px;
}

.burger-btn span {
    display: block;
    width: 26px;
    height: 3px;
    background-color: #ffffff;
    border-radius: 2px;
    transition: all 0.3s ease;
}

.burger-btn.active span:nth-child(1) {
    transform:translateY(8px) rotate(45deg);
}
.burger-btn.active span:nth-child(2) {
    opacity: 0;
}
.burger-btn.active span:nth-child(3) {
     transform: translateY(-8px) rotate(-45deg);
}

.nav-menu {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;

    position: absolute;
    top: 100%;
    left: 0;
    width: 200px;
    background-color: #1a1a2e;
    padding: 8px 16px 16px;
    border-radius: 0 0 8px 0;
    opacity: 0;
    pointer-events: none;
    transform: translatey(-8px);
    transition: all 0.2s ease;
}

.nav-menu.open {
    opacity: 1;
    pointer-events: auto;
    transform: translatey(0);
}

.nav-menu a {
    color: #e0e0e0;
    text-decoration: none;
    font-size: 16px;
    padding: 8px 8px;
    border-radius: 4px;
    transition: background-color 0.2s;
    display: block;
}

.nav-menu a:hover {
    background-color: #16213e;
    color: #ffffff
}

.hero {
    margin-top: 70px;
    padding: 60px 32px;
    max-width: 720px;
    width: 100%;
    margin:auto;
}
    </style>
</head>
<body>
     <nav class="navbar">
       <button class="burger-btn" id="burgerBtn" aria-label="Buka menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-menu" id="navMenu">
            <li><a href="index.html">Home</a></li>
            <li><a href="played-games.html">My Games List</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    <div class="crawling-border one"></div>
    <div class="crawling-border two"></div>
     <script src="script.js"></script>
</body>
</html>
